site_slug: "gojohnny-ai"
nome_negocio: "GoJohnny AI"
segmento: "coach de corrida com IA via WhatsApp (SaaS B2C, assinatura)"
descricao_curta: "Seu coach de corrida está no WhatsApp."
descricao_longa: >
  GoJohnny AI monta seu plano semanal de corrida com inteligência artificial
  e manda direto no WhatsApp, toda segunda-feira — sem app, sem humano no
  loop, com metodologia opinativa e um coach que se adapta à sua rotina, seu
  histórico e ao tom que você escolher. R$39,90/mês, sem fidelidade.

# Não é lista de serviços agendáveis — representa o único plano de assinatura.
servicos:
  - nome: "Plano mensal GoJohnny AI"
    descricao: "Plano semanal de corrida personalizado por IA via WhatsApp, ajuste por lesão/agenda, suporte via chat, relatório mensal de evolução e escolha do tom do coach."
    duracao_minutos: null   # não aplicável — assinatura contínua, não sessão
    preco: "R$39,90/mês"

# Não aplicável — produto 100% remoto, WhatsApp disponível 24/7.
horario_funcionamento:
  dias: "Todos os dias"
  inicio: "00:00"
  fim: "23:59"
  obs: "Produto 100% via WhatsApp, sem horário comercial — coach responde a qualquer hora (assíncrono/IA)."

cores:
  primaria: "#DAFF00"    # amarelo-ácido — CTA, destaque, único acento saturado
  secundaria: "#0D0D0D"  # preto editorial — fundo dominante alternado
  fundo: "#F4F2EE"       # off-white — fundo claro alternado
  texto: "#0D0D0D"       # texto principal sobre fundo claro
  # paleta completa (incl. --color-muted #6B6B6B, --color-disabled #2A2A2A,
  # --color-error #FF4D4D) e justificativa de esquema em design-plan.md —
  # este YAML cobre só os 4 campos tabulares do motor.

