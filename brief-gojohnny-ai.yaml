  descricao_meta: "Plano semanal de corrida personalizado por IA, direto no WhatsApp. Sem app, sem humano, sem enrolação. R$39,90/mês. Entre na lista de espera."
  keywords: "coach de corrida ia, treino de corrida whatsapp, plano de corrida personalizado, assessoria de corrida online, app de corrida com ia"

